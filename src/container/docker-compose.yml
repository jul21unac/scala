version: '3.8'

services:
  kudu-master-1:
    image: apache/kudu:latest
    container_name: kudu-master-1
    ports:
      - "7051:7051"  # RPC
      - "8051:8051"  # Web UI
    command:
      - "master"
      - "--unlock_unsafe_flags"  # ✅ Fix hybrid_clock warning
      - "--fs_wal_dir=/var/lib/kudu/master"
      - "--fs_data_dirs=/var/lib/kudu/master"
    volumes:
      - kudu-master1-data:/var/lib/kudu/master
    networks:
      - kudu-net
    environment:
      - KUDU_MASTERS=kudu-master-1:7051,kudu-master-2:7051,kudu-master-3:7051

  kudu-master-2:
    image: apache/kudu:latest
    container_name: kudu-master-2
    ports:
      - "7151:7051"
      - "8151:8051"
    command:
      - "master"
      - "--unlock_unsafe_flags"
      - "--fs_wal_dir=/var/lib/kudu/master"
      - "--fs_data_dirs=/var/lib/kudu/master"
    volumes:
      - kudu-master2-data:/var/lib/kudu/master
    networks:
      - kudu-net
    environment:
      - KUDU_MASTERS=kudu-master-1:7051,kudu-master-2:7051,kudu-master-3:7051

  kudu-master-3:
    image: apache/kudu:latest
    container_name: kudu-master-3
    ports:
      - "7251:7051"
      - "8251:8051"
    command:
      - "master"
      - "--unlock_unsafe_flags"
      - "--fs_wal_dir=/var/lib/kudu/master"
      - "--fs_data_dirs=/var/lib/kudu/master"
    volumes:
      - kudu-master3-data:/var/lib/kudu/master
    networks:
      - kudu-net
    environment:
      - KUDU_MASTERS=kudu-master-1:7051,kudu-master-2:7051,kudu-master-3:7051

  kudu-tserver-1:
    image: apache/kudu:latest
    container_name: kudu-tserver-1
    depends_on:
      - kudu-master-1
      - kudu-master-2
      - kudu-master-3
    ports:
      - "7050:7050"
      - "8050:8050"
    command:
      - "tserver"
      - "--unlock_unsafe_flags"
      - "--fs_wal_dir=/var/lib/kudu/tserver"
      - "--fs_data_dirs=/var/lib/kudu/tserver"
      - "--logtostderr"
    volumes:
      - kudu-tserver1-data:/var/lib/kudu/tserver
    networks:
      - kudu-net
    environment:
      - KUDU_MASTERS=kudu-master-1:7051,kudu-master-2:7051,kudu-master-3:7051
    deploy:
      replicas: 1

  kudu-tserver-2:
    image: apache/kudu:latest
    container_name: kudu-tserver-2
    depends_on:
      - kudu-master-1
    ports:
      - "7052:7050"
      - "8052:8050"
    command:
      - "tserver"
      - "--unlock_unsafe_flags"
      - "--fs_wal_dir=/var/lib/kudu/tserver"
      - "--fs_data_dirs=/var/lib/kudu/tserver"
    volumes:
      - kudu-tserver2-data:/var/lib/kudu/tserver
    networks:
      - kudu-net
    environment:
      - KUDU_MASTERS=kudu-master-1:7051,kudu-master-2:7051,kudu-master-3:7051

  kudu-tserver-3:
    image: apache/kudu:latest
    container_name: kudu-tserver-3
    depends_on:
      - kudu-master-1
    ports:
      - "7053:7050"
      - "8053:8050"
    command:
      - "tserver"
      - "--unlock_unsafe_flags"
      - "--fs_wal_dir=/var/lib/kudu/tserver"
      - "--fs_data_dirs=/var/lib/kudu/tserver"
    volumes:
      - kudu-tserver3-data:/var/lib/kudu/tserver
    networks:
      - kudu-net
    environment:
      - KUDU_MASTERS=kudu-master-1:7051,kudu-master-2:7051,kudu-master-3:7051

  impala:
    image: apache/kudu:impala-latest
    container_name: kudu-impala
    depends_on:
      - kudu-master-1
      - kudu-tserver-1
    ports:
      - "21000:21000"   # impala-shell
      - "21050:21050"   # JDBC/Beeline
      - "25000:25000"   # Impala Web UI
      - "25010:25010"   # Statestore UI
      - "25020:25020"   # Catalog UI
    networks:
      - kudu-net
    environment:
      - KUDU_MASTERS=kudu-master-1:7051,kudu-master-2:7051,kudu-master-3:7051

volumes:
  kudu-master1-data:
  kudu-master2-data:
  kudu-master3-data:
  kudu-tserver1-data:
  kudu-tserver2-data:
  kudu-tserver3-data:

networks:
  kudu-net:
    driver: bridge
